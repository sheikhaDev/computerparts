<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>رحلة استكشاف مكونات الحاسوب</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
body {
  margin: 0;
  font-family: 'Tahoma', sans-serif;
  background: linear-gradient(to bottom, #eef2ff, #ffffff);
}

.page {
  display: none;
  height: 100vh;
  width: 100%;
  justify-content: center;
  align-items: center;
  text-align: center;
}

.page.active {
  display: flex;
}

button {
  transition: 0.3s;
}
button:hover {
  transform: scale(1.05);
}
</style>

</head>

<body>

<!-- الصفحة 1 -->
<div id="page1" class="page active flex-col">

  <h1 class="text-3xl font-bold mb-4">
     رحلة استكشاف مكونات الحاسوب
  </h1>

  <p class="mb-6 text-gray-600">
    (أجهزة الإدخال والإخراج)
  </p>

  <button onclick="goToPage(2)"
  class="bg-yellow-500 text-white px-6 py-3 rounded-full shadow">
     ابدأ الرحلة
  </button>

</div>

<!-- الصفحة 2 -->
<div id="page2" class="page flex-col">

  <h2 class="text-2xl font-bold mb-4">🧠 ما هي أجهزة الإدخال؟</h2>

  <p class="mb-6">هي الأجهزة التي نستخدمها لإدخال البيانات إلى الحاسوب</p>

  <div class="text-xl mb-6">
     لوحة المفاتيح<br>
     الفأرة<br>
     الميكروفون
  </div>

  <button onclick="goToPage(3)"
  class="bg-blue-500 text-white px-6 py-2 rounded-full">
    التالي
  </button>

</div>

<!-- الصفحة 3 -->
<div id="page3" class="page flex-col">

  <h2 class="text-2xl font-bold mb-4"> ما هي أجهزة الإخراج؟</h2>

  <p class="mb-6">هي الأجهزة التي تعرض لنا نتائج المعالجة</p>

  <div class="text-xl mb-6">
     الشاشة<br>
     الطابعة<br>
     السماعات
  </div>

  <button onclick="goToPage(4)"
  class="bg-blue-500 text-white px-6 py-2 rounded-full">
    التالي
  </button>

</div>

<!-- الصفحة 4 (فيديو) -->
<div id="page4" class="page flex-col">

  <h2 class="text-2xl font-bold mb-4"> شاهد الفيديو</h2>

  <div class="w-full px-4">
    <iframe 
    class="w-full h-[300px] md:h-[400px]"
    src="https://www.youtube.com/embed/45LtBSwxfcU"
    allowfullscreen>
    </iframe>
  </div>

  <button onclick="goToPage(5)"
  class="bg-green-500 text-white px-6 py-2 mt-4 rounded-full">
    التالي
  </button>

</div>

<!-- الصفحة 5 -->
<div id="page5" class="page flex-col">

  <h2 class="text-2xl font-bold mb-4">🎉 أحسنت!</h2>

  <p class="mb-6">لقد أنهيت الدرس بنجاح</p>

  <button onclick="goToPage(1)"
  class="bg-yellow-500 text-white px-6 py-2 rounded-full">
    إعادة
  </button>

</div>

<script>
function goToPage(pageNumber) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page' + pageNumber).classList.add('active');
}
</script>

</body>
</html>
